# Parsers
bat = "0.26.1"
yq = "4.52.4"
jq = "1.8.1"
jless = "0.9.0"

# Diff
delta = "0.18.2"
difftastic = "0.67.0"

# Git
lazygit = "0.59.0"
lefthook = "2.1.1"
gitleaks = "8.30.0"

# Terminal
tmux = "3.6a"
gum = "0.17.0"

# OS
"cargo:procs" = "0.14.11"
bottom = "0.12.3"

# Databases
sqlite = "3.51.2"
