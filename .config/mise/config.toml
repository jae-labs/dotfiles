black = "26.1.0"
tflint = "0.61.0"
golangci-lint = "2.10.1"
shellcheck = "0.11.0"
shfmt = "3.12.0"
"npm:bash-language-server" = "5.6.0"
"npm:prettier" = "3.8.1"

# Security
